<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/main.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Expense Tracker App | Track Your Spending & Budget Easily</title>
    <meta
      name="description"
      content="A modern expense tracker app to manage your finances, track spending, set budgets, and visualize your expenses بسهولة."
    />
    <meta
      name="keywords"
      content="expense tracker, budget app, personal finance, money management, MERN expense tracker"
    />
    <meta name="author" content="Ahmad Mohamed" />

    <!-- Open Graph (for sharing on WhatsApp, LinkedIn, etc.) -->
    <meta property="og:title" content="Expense Tracker App" />
    <meta
      property="og:description"
      content="Track your expenses, manage budgets, and gain insights into your spending habits."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_FRONTEND_URL%" />
    <meta property="og:image" content="/expense.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Expense Tracker App" />
    <meta
      name="twitter:description"
      content="Track your expenses and manage your budget Easily"
    />
    <meta name="twitter:image" content="/expense.png" />

    <!-- Theme color (mobile browser UI) -->
    <meta name="theme-color" content="#7fdac2" />

    <!-- Optional: Robots -->
    <meta name="robots" content="index, follow" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
